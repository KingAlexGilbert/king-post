plugins {
    id 'com.android.application'
}

android {
    namespace 'com.kingalexgilbert.triplepostlocal'
    compileSdk 37

    defaultConfig {
        applicationId 'com.kingalexgilbert.triplepostlocal'
        minSdk 23
        targetSdk 37
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
